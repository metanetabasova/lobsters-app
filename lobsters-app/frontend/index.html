<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Top Lobsters Posts</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="page">

    <header class="page-header">
      <h1>Top Posts — Lobsters</h1>
      <p>The 10 hottest posts right now, pulled from our database.</p>
    </header>

    <ul id="post-list" class="post-list">
      <!-- Posts will be inserted here by app.js -->
    </ul>

    <div id="state-message" class="state-message">Loading posts...</div>

    <footer class="page-footer">
      <p>Data fetched from Lobsters' public API and stored locally via our pipeline.</p>
    </footer>

  </div>

  <script src="app.js"></script>
</body>
</html>
